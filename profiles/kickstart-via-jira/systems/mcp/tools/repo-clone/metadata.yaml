name: repo_clone
description: Clone a repository from Azure DevOps, create an initiative branch, and configure NuGet authentication. Returns the clone path, default branch, and working branch name.
version: 1.0.0
category: kickstart-via-jira

inputSchema:
  type: object
  properties:
    project:
      type: string
      description: Azure DevOps project name (e.g., "Titan", "CountryOnboarding")
    repo:
      type: string
      description: Repository name (e.g., "EInvoiceUpload")
  required: [project, repo]
  additionalProperties: false

examples:
  - description: Clone a repo from the Titan project
    input:
      project: Titan
      repo: EInvoiceUpload
